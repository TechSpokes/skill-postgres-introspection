title: "Questions And Help"
labels: ["question", "help wanted"]
body:
  - type: markdown
    attributes:
      value: |
        Ask questions about using the Postgres Introspection skill.
  - type: dropdown
    id: question-type
    attributes:
      label: Question Type
      options:
        - Getting started
        - Installing the skill
        - Adapting the reference implementation
        - Applying the method to another database
        - Reading the state
        - Validation or release
        - Other
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What specific help do you need?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Share commands, repository state, or generic examples. Do not include secrets or a real domain schema.
