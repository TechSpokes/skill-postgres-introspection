title: "Ideas And Suggestions"
labels: ["enhancement", "discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Share ideas for improving the Postgres Introspection skill.
  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: What improvement would you like to see?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this solve?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Introspection method
        - Reference implementation
        - Reading and judgment
        - Commenting and intent
        - Other databases
        - Validation
        - Release packaging
        - Documentation
        - Other
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I can help test this idea.
        - label: I can provide a generic example.
        - label: I can help with documentation.
