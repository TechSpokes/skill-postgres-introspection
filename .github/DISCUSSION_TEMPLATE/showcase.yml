title: "Show And Tell"
labels: ["showcase", "community"]
body:
  - type: markdown
    attributes:
      value: |
        Share how you used the Postgres Introspection skill.
  - type: input
    id: repository
    attributes:
      label: Repository Or Project
      description: Link to the repository or describe the project.
  - type: textarea
    id: usage
    attributes:
      label: How You Used It
      description: What did the introspection setup help you do?
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Workflow Notes
      description: What worked well or what needed adaptation?
  - type: textarea
    id: lessons
    attributes:
      label: Lessons Learned
      description: What would help others using this skill?
