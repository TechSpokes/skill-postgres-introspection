title: "General Discussion"
labels: ["discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Start a general discussion about the Postgres Introspection skill.
  - type: dropdown
    id: topic-category
    attributes:
      label: Topic Category
      options:
        - Skill direction
        - Introspection method
        - Reference implementation
        - Reading and judgment
        - Commenting and intent
        - Validation and release
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: discussion-topic
    attributes:
      label: Discussion Topic
      description: What would you like to discuss?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add background that would help others understand the topic.
