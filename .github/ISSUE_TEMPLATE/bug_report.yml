name: Bug report
description: Report a problem with the skill, the reference scripts, validation, packaging, or workflows
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail to reproduce the issue without secrets or a real domain schema.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SKILL.md or references
        - Reference scripts
        - Validation script
        - Release packaging
        - GitHub Actions workflow
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Logs or output
      description: Paste relevant command output. Remove secrets and any real domain schema.
      render: text
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Operating system:
        - Node.js version:
        - npm version:
        - PostgreSQL version (if relevant):
