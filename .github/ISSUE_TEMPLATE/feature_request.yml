name: Feature request
description: Suggest an improvement to the skill or its reference implementation
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem would this improvement solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change and where it would belong.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Introspection method
        - Reference implementation
        - Reading and judgment
        - Commenting and intent
        - Other databases
        - Validation
        - Packaging
        - Release workflow
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: How would this change affect agents and repositories that use the skill?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
