name: Question
description: Ask a question about using or adapting the template
labels: [question]
body:
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Describe what you are trying to do and where you are stuck.
    validations:
      required: true
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Creating a repository from the template
        - Preparing intake material
        - Running the bootstrap agent workflow
        - Generated AGENTS.md or README.md
        - Validation or packaging
        - Publishing release assets
        - Other
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include links, commands, or non-private examples that help explain the question.
