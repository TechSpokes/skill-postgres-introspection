name: Question
description: Ask a question about using or adapting the skill
labels: [question]
body:
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Describe what you are trying to do and where you are stuck.
    validations:
      required: true
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Installing the skill
        - Running it against a repository
        - Adapting the reference implementation
        - Applying the method to another database
        - Reading the state
        - Validation or packaging
        - Publishing release assets
        - Other
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include links, commands, or generic examples that help explain the question.
